<div class="container">

  <h2 mat-dialog-title class="title">Brisanje korisnika</h2>

  <mat-dialog-content class="message-container">
    Da li ste sigurni da želite da obrišete korisnika {{username}}?
  </mat-dialog-content>

  <mat-dialog-actions class="button-container">
    <button mat-button mat-dialog-close>Ne</button>
    <button mat-button cdkFocusInitial (click)="deactivateUser()">Da</button>
  </mat-dialog-actions>

</div>
