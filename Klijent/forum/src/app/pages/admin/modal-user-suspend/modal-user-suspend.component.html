<div class="container">

  <h2 mat-dialog-title class="title">Suspezija korisnika</h2>

  <mat-dialog-content class="field-container">
    <mat-form-field class="form-field">
      <mat-label>Odaberite datum</mat-label>
      <input matInput [matDatepicker]="picker" (dateChange)="onDateChange($event.value)">
      <mat-hint>MM/DD/YYYY</mat-hint>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

  </mat-dialog-content>

  <mat-dialog-actions class="button-container">
    <button mat-button mat-dialog-close>Odustani</button>
    <button mat-button cdkFocusInitial (click)="suspendUser()">Potvrdi</button>
  </mat-dialog-actions>

</div>
