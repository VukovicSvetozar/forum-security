<app-menu></app-menu>

<div id="container">

    <div id="page-title">
        Lista korisnika
    </div>

    <div class="search-container">
        <mat-form-field class="search-users">
            <mat-label>Pretraga</mat-label>
            <input matInput (keyup)="searchUsers($event)" placeholder="..." #input>
        </mat-form-field>
    </div>

    <div class="content-user-container">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

            <ng-container matColumnDef="profile">
                <th mat-header-cell *matHeaderCellDef class="user-table-header"> Profil </th>
                <td mat-cell *matCellDef="let element" class="user-table-field">
                    <img [src]="element.avatarUrl || 'assets/avatars/0.png'" alt="Nema slike" width="40" height="40"
                        class="avatar-image" (click)="openModalInfoUser(element.id)">
                </td>
            </ng-container>

            <ng-container matColumnDef="username">
                <th mat-header-cell *matHeaderCellDef class="user-table-header"> Ime </th>
                <td mat-cell *matCellDef="let element" class="user-table-field"> {{element.username}} </td>
            </ng-container>

            <ng-container matColumnDef="group">
                <th mat-header-cell *matHeaderCellDef class="user-table-header"> Grupa </th>
                <td mat-cell *matCellDef="let element" class="user-table-field"> {{element.group}} </td>
            </ng-container>

            <ng-container matColumnDef="totalPosts">
                <th mat-header-cell *matHeaderCellDef class="user-table-header"> Postovi </th>
                <td mat-cell *matCellDef="let element" class="user-table-field"> {{element.totalPosts}} </td>
            </ng-container>

            <ng-container matColumnDef="accessDate">
                <th mat-header-cell *matHeaderCellDef class="user-table-header"> Pridružio se </th>
                <td mat-cell *matCellDef="let element" class="user-table-field"> {{element.accessDate}} </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
            <tr mat-row *matRowDef="let row; columns: columnsToDisplay;" class="user-table-row"></tr>

        </table>
    </div>

</div>
